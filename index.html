<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMower App</title>
    <script>
      // Set initial theme background before Vue mounts to avoid flash of unstyled content
      (function () {
        try {
          var d = window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light')
          document.body.style.background = d ? '#121212' : '#fafafa'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
